name: Deploy to tapdata.lgit.nl

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: tapdata.lgit.nl
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/opt/tapdata

            # Pull latest code
            cd $APP_DIR
            git pull origin main

            # Install / update dependencies in virtualenv
            venv/bin/pip install -r requirements.txt --quiet

            # Restart the service
            sudo systemctl restart tapdata

            echo "Deployment complete"
